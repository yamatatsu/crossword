name: Generate Daily Puzzle

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Calculate tomorrow's date in JST
        id: date
        run: echo "puzzle_date=$(TZ=Asia/Tokyo date -d '+1 day' +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Generate puzzle with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Generate a new crossword puzzle for ${{ steps.date.outputs.puzzle_date }} using the /generate-crossword skill.

            Follow the skill's 7-step workflow to create a high-quality puzzle.
            Do NOT commit or push. Only generate and validate the puzzle file.
          claude_args: "--max-turns 30"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          PUZZLE_FILE="public/puzzles/${{ steps.date.outputs.puzzle_date }}.json"
          if [ ! -f "$PUZZLE_FILE" ]; then
            echo "Error: Puzzle file $PUZZLE_FILE was not generated"
            exit 1
          fi
          git add "$PUZZLE_FILE"
          if git diff --cached --quiet; then
            echo "No changes to commit for $PUZZLE_FILE"
          else
            git commit -m "puzzle: add ${{ steps.date.outputs.puzzle_date }} daily puzzle"
            git push
          fi
