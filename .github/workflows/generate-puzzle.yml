name: Generate Daily Puzzle

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Calculate tomorrow's date in JST
        id: date
        run: echo "puzzle_date=$(TZ=Asia/Tokyo date -d '+1 day' +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Generate puzzle with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Generate a new crossword puzzle for ${{ steps.date.outputs.puzzle_date }} using the /generate-crossword skill.

            Follow the skill's 7-step workflow to create a high-quality puzzle.
            After validation passes, commit with message "puzzle: add ${{ steps.date.outputs.puzzle_date }} daily puzzle".

      - name: Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push
